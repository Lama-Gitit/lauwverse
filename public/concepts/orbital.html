<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Concept 5 — Orbital / Spatial Layout</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Big+Shoulders+Display:ital,wght@0,800;0,900;1,900&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #03020E;
    color: #F0F0F9;
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    overflow: hidden;
    cursor: crosshair;
  }
  body::before {
    content: "";
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(45,77,195,0.015) 3px, rgba(45,77,195,0.015) 6px);
    pointer-events: none; z-index: 1000;
  }

  .orbital-scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .orbital-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .orbital-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
  }
  .orbital-center .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #697DEB;
    box-shadow: 0 0 16px rgba(105,125,235,0.6), 0 0 40px rgba(105,125,235,0.2);
    animation: pulse 2s infinite;
    margin-bottom: 8px;
  }
  .orbital-center .label {
    font-size: 0.625rem;
    letter-spacing: 0.4em;
    color: #695DBE;
  }

  .orbital-card {
    position: absolute;
    z-index: 10;
    width: 280px;
    border: 1px solid rgba(105,125,235,0.2);
    background: rgba(3,2,14,0.9);
    backdrop-filter: blur(12px);
    padding: 0;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
    transform-style: preserve-3d;
    perspective: 800px;
  }
  .orbital-card:hover {
    border-color: rgba(105,125,235,0.5);
    box-shadow: 0 0 40px rgba(105,125,235,0.1);
    z-index: 20;
  }

  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(105,125,235,0.12);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-header .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.5625rem;
    letter-spacing: 0.25em;
    color: #695DBE;
  }
  .card-header .status .s-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  .card-header .orbit-id {
    font-size: 0.5rem;
    letter-spacing: 0.2em;
    color: #5344AC;
  }

  .card-body {
    padding: 20px;
  }
  .card-title {
    font-family: 'Big Shoulders Display', Impact, sans-serif;
    font-size: 2rem;
    font-weight: 900;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    line-height: 0.9;
    margin-bottom: 10px;
    transition: transform 0.3s ease;
  }
  .orbital-card:hover .card-title {
    transform: translateX(4px);
  }
  .card-desc-text {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 300;
    line-height: 1.6;
    color: #8278CB;
  }

  .card-footer {
    padding: 12px 20px;
    border-top: 1px solid rgba(105,125,235,0.12);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-tags {
    display: flex;
    gap: 6px;
  }
  .card-tags span {
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    color: #695DBE;
    padding: 3px 8px;
    border: 1px solid rgba(105,125,235,0.15);
  }
  .card-cta {
    font-size: 0.625rem;
    letter-spacing: 0.2em;
    color: #5344AC;
    transition: color 0.3s;
  }
  .orbital-card:hover .card-cta {
    color: #697DEB;
  }

  /* orbit trail lines */
  .orbit-ring {
    position: absolute;
    top: 50%; left: 50%;
    border-radius: 50%;
    border: 1px solid rgba(105,125,235,0.06);
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<div class="orbital-scene">
  <canvas class="orbital-canvas" id="orbital-bg"></canvas>

  <!-- Orbit rings -->
  <div class="orbit-ring" style="width:400px;height:400px;"></div>
  <div class="orbit-ring" style="width:600px;height:600px;"></div>
  <div class="orbit-ring" style="width:820px;height:820px;border-style:dashed;border-color:rgba(105,125,235,0.04);"></div>

  <!-- Center label -->
  <div class="orbital-center">
    <div class="dot"></div>
    <span class="label">LAUWVERSE</span>
  </div>

  <!-- KIZUNA — orbits left-top -->
  <a href="https://www.kizuna.gg" target="_blank" rel="noopener noreferrer" class="orbital-card" id="card-kizuna">
    <div class="card-header">
      <div class="status"><span class="s-dot" style="background:#697DEB;box-shadow:0 0 6px rgba(105,125,235,0.8)"></span> LIVE</div>
      <span class="orbit-id">ORB_001</span>
    </div>
    <div class="card-body">
      <div class="card-title">KIZUNA</div>
      <p class="card-desc-text">Community intelligence platform. Discord-native signal processing and activation.</p>
    </div>
    <div class="card-footer">
      <div class="card-tags"><span>SOCIAL AI</span><span>DESIGN</span></div>
      <span class="card-cta">ENTER &#8599;</span>
    </div>
  </a>

  <!-- WOLVES — orbits right-bottom -->
  <a href="https://www.wolves.co" target="_blank" rel="noopener noreferrer" class="orbital-card" id="card-wolves">
    <div class="card-header">
      <div class="status"><span class="s-dot" style="background:#5344AC;box-shadow:0 0 6px rgba(83,68,172,0.5)"></span> ARCHIVE</div>
      <span class="orbit-id">ORB_002</span>
    </div>
    <div class="card-body">
      <div class="card-title">WOLVES</div>
      <p class="card-desc-text">Digital collective. Web3 culture, creative direction, and community-first thinking.</p>
    </div>
    <div class="card-footer">
      <div class="card-tags"><span>WEB3</span><span>CULTURE</span></div>
      <span class="card-cta">ENTER &#8599;</span>
    </div>
  </a>
</div>

<script>
// ── Orbit animation for cards ──
(function() {
  const kizuna = document.getElementById('card-kizuna');
  const wolves = document.getElementById('card-wolves');
  const speed = 0.0002;
  let angleK = 0;
  let angleW = Math.PI;

  function animate(t) {
    requestAnimationFrame(animate);
    const time = t * 0.001;

    // elliptical orbit
    const radiusX = 260;
    const radiusY = 180;

    angleK = time * speed * 1000;
    angleW = time * speed * 1000 + Math.PI;

    const kx = Math.cos(angleK) * radiusX;
    const ky = Math.sin(angleK) * radiusY;
    const wx = Math.cos(angleW) * radiusX;
    const wy = Math.sin(angleW) * radiusY;

    // 3D tilt based on position in orbit
    const kRotY = Math.cos(angleK) * 8;
    const kRotX = Math.sin(angleK) * 4;
    const wRotY = Math.cos(angleW) * 8;
    const wRotX = Math.sin(angleW) * 4;

    // scale based on "depth" (y position in orbit = closer/farther)
    const kScale = 0.9 + Math.sin(angleK) * 0.1;
    const wScale = 0.9 + Math.sin(angleW) * 0.1;

    kizuna.style.left = `calc(50% + ${kx}px - 140px)`;
    kizuna.style.top = `calc(50% + ${ky}px - 80px)`;
    kizuna.style.transform = `scale(${kScale}) rotateY(${kRotY}deg) rotateX(${kRotX}deg)`;
    kizuna.style.zIndex = ky > 0 ? 15 : 5;

    wolves.style.left = `calc(50% + ${wx}px - 140px)`;
    wolves.style.top = `calc(50% + ${wy}px - 80px)`;
    wolves.style.transform = `scale(${wScale}) rotateY(${wRotY}deg) rotateX(${wRotX}deg)`;
    wolves.style.zIndex = wy > 0 ? 15 : 5;
  }
  requestAnimationFrame(animate);
})();

// ── Background stars ──
(function() {
  const canvas = document.getElementById('orbital-bg');
  const ctx = canvas.getContext('2d');
  let w, h;

  function resize() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    w = window.innerWidth; h = window.innerHeight;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const stars = Array.from({ length: 120 }, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.2 + 0.2,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.4 + 0.15,
  }));

  function draw(t) {
    requestAnimationFrame(draw);
    ctx.clearRect(0, 0, w, h);
    const time = t * 0.001;

    for (const s of stars) {
      const a = 0.2 + 0.5 * Math.sin(s.phase + time * s.speed);
      ctx.beginPath();
      ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(185,181,227,${a * 0.4})`;
      ctx.fill();
    }
  }
  requestAnimationFrame(draw);
})();
</script>

</body>
</html>
