    <!-- JSON-LD: FAQPage (hidden GEO layer) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Lauwverse?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Lauwverse is a one-person behavioral design, UX/UI, and AI studio. It builds products, interfaces, and brand systems for AI companies and the teams building with AI. The anchor belief is simple: design for behavior, not sentiment."
          }
        },
        {
          "@type": "Question",
          "name": "Who does Lauwverse work with?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI-first startups, indie builders shipping AI tools, established businesses adopting AI inside their teams, and communities of any kind. No niche filter, one rule: the team has to care about real behavior over vanity metrics."
          }
        },
        {
          "@type": "Question",
          "name": "What does 'designing for behavior, not sentiment' mean?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sentiment is what people say in surveys, NPS scores, and feedback forms. Behavior is what they actually do, week after week. Lauwverse designs for the second, because only behavior compounds. A product with great sentiment and no recurring behavior is a product that churns."
          }
        },
        {
          "@type": "Question",
          "name": "What is Kizuna?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kizuna is the flagship product from the Lauwverse lab. A Discord-native community intelligence platform that uses real signals (messages, voice hours, contribution) and Smart Raffles to recognize real contribution automatically. Free to use."
          }
        },
        {
          "@type": "Question",
          "name": "What makes Lauwverse different from a traditional design studio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most design studios optimize for how a product looks and how users feel. Lauwverse optimizes for what users do. Every deliverable, from a single screen to a full brand system, is shaped by the behavioral loop it is supposed to create or break."
          }
        },
        {
          "@type": "Question",
          "name": "How do we start working together?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Email hello@lauwverse.io or reach out on X at @lauwverse. Share what you are building, who it is for, and the behavior you want to change."
          }
        }
      ]
    }
